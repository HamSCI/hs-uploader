# /etc/tmpfiles.d/hs-uploader.conf
# Pre-create /var/lib/hs-uploader with group=sigmond + setgid (02775) so
# the watermark store can be safely shared across HamSCI client users
# (pskrec, wsprdaemon, ...) that all belong to the sigmond supplementary
# group.  Without this, the first user to construct a
# `SqliteWatermarkStore` creates the dir with their own group, and a
# second user from a different system account gets "attempt to write a
# readonly database" on its first ack — observed on bee1 2026-05-12 during
# the wspr-uploader cutover.
#
# The watermark.db file mode is handled in-process by
# SqliteWatermarkStore._chmod_group_writable() (sets the file 0664 after
# init); this entry only handles the directory.
#
# Format: Type Path Mode User Group Age Argument
d /var/lib/hs-uploader 02775 root sigmond - -
